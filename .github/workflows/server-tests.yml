name: Server Tests

on:
  push:
  pull_request:

jobs:
  test-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/server/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/server

      - name: Run tests
        run: npm test
        working-directory: apps/server
